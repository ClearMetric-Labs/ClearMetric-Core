name: publish

on:
  push:
    tags:
      - "catalogkit-core-v*"
      - "catalogkit-query-v*"
      - "catalogkit-v*"
  workflow_dispatch:
    inputs:
      package:
        description: Package to publish
        required: true
        type: choice
        options:
          - catalogkit-core
          - catalogkit-query
          - catalogkit

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Resolve package path
        id: package
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PACKAGE="${{ inputs.package }}"
          else
            TAG="${GITHUB_REF_NAME}"
            PACKAGE="${TAG%%-v*}"
          fi

          case "$PACKAGE" in
            catalogkit-core)
              echo "name=catalogkit-core" >> "$GITHUB_OUTPUT"
              echo "path=packages/catalogkit-core" >> "$GITHUB_OUTPUT"
              ;;
            catalogkit-query)
              echo "name=catalogkit-query" >> "$GITHUB_OUTPUT"
              echo "path=packages/catalogkit-query" >> "$GITHUB_OUTPUT"
              ;;
            catalogkit)
              echo "name=catalogkit" >> "$GITHUB_OUTPUT"
              echo "path=packages/catalogkit" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported package: $PACKAGE" >&2
              exit 1
              ;;
          esac

      - name: Install release dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build distribution artifacts
        run: python -m build ${{ steps.package.outputs.path }}

      - name: Validate package metadata
        run: python -m twine check ${{ steps.package.outputs.path }}/dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ steps.package.outputs.path }}/dist
