name: ci

on:
  push:
  pull_request:

jobs:
  package-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - name: catalogkit-core
            path: packages/catalogkit-core
          - name: catalogkit-query
            path: packages/catalogkit-query
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine pytest

      - name: Install package dependencies
        run: |
          if [ "${{ matrix.package.name }}" = "catalogkit-query" ]; then
            python -m pip install -e packages/catalogkit-core
          fi
          python -m pip install -e "${{ matrix.package.path }}[dev,release]"

      - name: Run package test suite
        run: python -m pytest -v ${{ matrix.package.path }}/tests

      - name: Build distribution artifacts
        run: |
          python -m build ${{ matrix.package.path }}
          if [ "${{ matrix.package.name }}" = "catalogkit-query" ]; then
            python -m build packages/catalogkit-core
          fi

      - name: Validate package metadata
        run: python -m twine check ${{ matrix.package.path }}/dist/*

      - name: Smoke test installed wheel
        run: |
          python -m venv .pkgtest
          . .pkgtest/bin/activate
          python -m pip install --upgrade pip
          if [ "${{ matrix.package.name }}" = "catalogkit-core" ]; then
            python -m pip install ${{ matrix.package.path }}/dist/*.whl
            python -c "import catalogkit.core as core; print(core.__version__)"
          else
            python -m pip install packages/catalogkit-core/dist/*.whl
            python -m pip install ${{ matrix.package.path }}/dist/*.whl
            catalogkit-query --dialect postgres packages/catalogkit-query/examples/ugly_real_world.sql
            python -m catalogkit.query --dialect postgres packages/catalogkit-query/examples/simple.sql
            python -c "import catalogkit.core; import catalogkit.query"
          fi

  repository-boundaries:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e packages/catalogkit-core
          python -m pip install -e "packages/catalogkit-query[dev]"

      - name: Run repository boundary checks
        run: python -m pytest -v tests/test_repository_boundaries.py

  meta-package:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install release dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build package artifacts
        run: |
          python -m build packages/catalogkit-core
          python -m build packages/catalogkit-query
          python -m build packages/catalogkit

      - name: Validate package metadata
        run: |
          python -m twine check packages/catalogkit-core/dist/*
          python -m twine check packages/catalogkit-query/dist/*
          python -m twine check packages/catalogkit/dist/*

      - name: Smoke test namespace package install
        run: |
          python -m venv .pkgmeta
          . .pkgmeta/bin/activate
          python -m pip install --upgrade pip
          python -m pip install packages/catalogkit-core/dist/*.whl
          python -m pip install packages/catalogkit-query/dist/*.whl
          python -m pip install --no-deps packages/catalogkit/dist/*.whl
          python -c "import catalogkit.core; import catalogkit.query"
